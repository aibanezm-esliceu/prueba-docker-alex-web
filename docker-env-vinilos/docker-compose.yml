services:
  web:
    build: .
    container_name: php-web-vinilos
    ports:
      - "8085:80"
    volumes:
      - ./proyecto-php-vinilos:/var/www/html
    depends_on:
      - db
  db:
    image: mariadb:11
    container_name: mariadb-vinilos
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: vinilos_php
      MYSQL_USER: vinilo_user
      MYSQL_PASSWORD: retro123
    volumes:
      - ./db-vinilos:/var/lib/mysql
    ports:
      - "3308:3306"
  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: phpmyadmin-vinilos
    restart: always
    depends_on:
      - db
    environment:
      PMA_HOST: db
      PMA_USER: vinilo_user
      PMA_PASSWORD: retro123
    ports:
      - "8086:80"
  browsersync:
    image: node:20-alpine
    container_name: browsersync-vinilos
    working_dir: /app
    depends_on:
      - web
    volumes:
      - ./proyecto-php-vinilos:/src
    command: sh -c "npm install -g browser-sync && browser-sync start --proxy 'web:80' --files '/src/**/*.*' --no-ui --host 0.0.0.0 --port 3002"
    ports:
      - "3005:3002"
